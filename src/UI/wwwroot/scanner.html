<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/scanner.css">
</head>
<body>

    <div class="header">
        <h1>Barcode Scanner</h1>
        <p><i class="ph ph-lock-key"></i> Connected securely to Desktop API</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <i class="ph ph-camera"></i> Live Camera
            </div>
            
            <div id="reader"></div>

            <div class="result-box">
                <div class="result-label">Last Scanned Barcode</div>
                <div class="result-value" id="last-result">— None —</div>
                <div class="api-status pending" id="api-status">Waiting for scan...</div>
                
                <button class="btn btn-outline" style="margin-top: 12px; font-size: 12px; padding: 6px 12px; display: inline-flex; width: auto;" onclick="resetLastScan()">
                    <i class="ph ph-arrows-clockwise"></i> Scan Same Item Again
                </button>
            </div>

            <button id="startBtn" class="btn btn-primary" onclick="startScanner()">
                <i class="ph ph-play-circle"></i> Start Scanning
            </button>
            <button id="stopBtn" class="btn btn-outline" onclick="stopScanner()" style="display: none;">
                <i class="ph ph-stop-circle"></i> Stop Camera
            </button>
        </div>

        <div class="card">
            <div class="stats-header">
                <div class="card-header" style="margin-bottom: 0; border: none; padding: 0;">
                    <i class="ph ph-list-dashes"></i> Scan History
                </div>
                <button class="btn btn-danger" onclick="clearHistory()">
                    <i class="ph ph-trash"></i> Clear
                </button>
            </div>
            
            <div class="history-list" id="history-list">
                <div class="empty-state">
                    <i class="ph ph-barcode" style="font-size: 32px; opacity: 0.5; margin-bottom: 8px;"></i>
                    <p>No barcodes scanned yet</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scanner.js"></script>
</body>
</html>
